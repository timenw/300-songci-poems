name: Build Android

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --info > /tmp/build.log 2>&1; echo "EXIT=$?"

      - name: Show build log tail
        if: always()
        run: |
          echo "=== LAST 60 LINES ==="
          tail -60 /tmp/build.log
          echo "=== APK SEARCH ==="
          find . -name "*.apk" 2>/dev/null
          echo "=== BUILD OUTPUTS DIR ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/*.apk"
          retention-days: 30
